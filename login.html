<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log In — Turkana Gold Summit & Minerals Expo 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --navy-900:#0b1f3a; --navy-700:#163560; --orange:#f26522; --orange-600:#d9541a;
  --off-white:#f7f8fb; --text:#1c2536; --text-soft:#4b5568; --border:#e2e6ee;
  --radius:10px; --shadow-sm: 0 4px 12px rgba(11, 31, 58, 0.06); --shadow-md:0 12px 30px rgba(11,31,58,.10);
  --font-head:'Poppins', system-ui, sans-serif; --font-body:'Inter', system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;}
body{margin:0;min-height:100vh;display:flex;flex-direction:column;font-family:var(--font-body);color:var(--text);background:var(--off-white);}
a{color:inherit;text-decoration:none;}
h1{font-family:var(--font-head);color:var(--navy-900);}

/* ---------- HEADER ---------- */
.site-header {
  position: sticky; top: 0; z-index: 50;
  background: #fff;
  border-bottom: 1px solid var(--border);
  transition: box-shadow .2s ease;
}
.site-header.scrolled { box-shadow: var(--shadow-sm); }
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0;
  gap: 24px;
  width: min(1300px, 94%);
  margin: 0 auto;
}
.logo-wrap {
  display: flex;
  align-items: center;
  gap: 16px;
}
.logo { display: flex; align-items: center; }
.logo img { 
  height: 75px; 
  width: auto; 
  transition: transform 0.2s ease; 
}
.logo img:hover { transform: scale(1.05); }
.logo-divider {
  width: 1px;
  height: 45px;
  background: var(--border);
}
.partner-carousel {
  position: relative;
  width: 150px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.partner-carousel .partner-logo {
  position: absolute;
  max-height: 42px;
  max-width: 100%;
  height: auto;
  width: auto;
  opacity: 0;
  transition: opacity 0.5s ease-in-out, filter 0.2s ease;
  pointer-events: none;
  filter: grayscale(0%);
}
.partner-carousel .partner-logo.active {
  opacity: 0.75;
  pointer-events: auto;
}
.partner-carousel .partner-logo:hover {
  opacity: 1;
  filter: none;
}

.main-nav { 
  display: flex; 
  gap: 22px;
  white-space: nowrap;
}
.main-nav a {
  font-family: var(--font-head);
  font-weight: 500;
  font-size: .92rem;
  color: var(--navy-900);
  position: relative;
  padding: 6px 0;
  white-space: nowrap;
}
.main-nav a::after {
  content: ''; position: absolute; left: 0; bottom: 0;
  width: 0; height: 2px; background: var(--orange);
  transition: width .25s;
}
.main-nav a:hover::after { width: 100%; }

.nav-actions { 
  display: flex; 
  align-items: center; 
  gap: 12px; 
  white-space: nowrap;
}
.menu-toggle {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: transparent;
  border: 0;
  padding: 8px;
  cursor: pointer;
}
.menu-toggle span {
  width: 24px; height: 2px; background: var(--navy-900); border-radius: 2px;
  transition: transform .2s, opacity .2s;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 12px 26px;
  border-radius: 999px;
  font-family: var(--font-head);
  font-weight: 600;
  font-size: .95rem;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all .2s ease;
  white-space: nowrap;
}
.site-header .btn {
  width: auto;
  display: inline-flex;
}

.center-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 20px;}
.login-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:40px 36px;width:100%;max-width:420px;}
.login-card h1{font-size:1.6rem;margin:0 0 6px;text-align:center;}
.login-sub{text-align:center;color:var(--text-soft);font-size:.9rem;margin-bottom:28px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
label{font-family:var(--font-head);font-weight:600;font-size:.85rem;color:var(--navy-900);}
input{font-family:var(--font-body);font-size:.95rem;padding:11px 14px;border:1px solid var(--border);border-radius:8px;outline:none;transition:border-color .2s;}
input:focus{border-color:var(--orange);}

.password-input-wrap {
  position: relative;
  display: flex;
  align-items: center;
  width: 100%;
}
.password-input-wrap input {
  width: 100%;
  padding-right: 46px;
}
.password-toggle-btn {
  position: absolute;
  right: 12px;
  background: none;
  border: none;
  padding: 4px;
  cursor: pointer;
  color: var(--text-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s;
}
.password-toggle-btn:hover {
  color: var(--orange);
}
.password-toggle-btn svg {
  display: block;
}
.btn-primary{display:flex;width:100%;align-items:center;justify-content:center;padding:13px 28px;border-radius:999px;font-family:var(--font-head);font-weight:600;font-size:.95rem;border:2px solid transparent;background:var(--orange);color:#fff;cursor:pointer;transition:background .2s;}
.btn-primary:hover{background:var(--orange-600);}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;}
.form-msg{display:none;padding:12px 16px;border-radius:8px;font-size:.88rem;margin-bottom:18px;}
.form-msg-error{display:block;background:#fdecea;color:#a83226;border:1px solid #f5c6c1;}
.form-msg-success{display:block;background:#e9f7ee;color:#1d7a41;border:1px solid #bfe7cc;}
.reg-note{text-align:center;margin-top:20px;color:var(--text-soft);font-size:.9rem;}
.reg-note a{color:var(--orange);font-weight:600;}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 1024px) {
  .main-nav {
    position: absolute;
    top: 100%; left: 0; right: 0;
    background: #fff;
    flex-direction: column;
    padding: 20px;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    display: none;
  }
  .main-nav.open { display: flex; }
  .menu-toggle { display: flex; }
  .logo-divider, .partner-carousel { display: none; }
}
@media (max-width: 600px) {
  .nav-actions .btn { padding: 10px 18px; font-size: .85rem; }
}
</style>
</head>
<body>

<header class="site-header" id="siteHeader">
  <div class="container nav-inner">
    <div class="logo-wrap">
      <a href="index.html" class="logo" aria-label="Turkana Gold Summit Home">
        <img src="public/images/turkana_gold_summit&minerals_expo.png" alt="Turkana Gold Summit Logo" class="summit-logo-img" onerror="this.style.display='none'" />
      </a>
      <div class="logo-divider"></div>
      <div class="partner-carousel" id="navPartnerCarousel" aria-label="Strategic Partners">
        <img src="public/images/solidaridad.png" alt="Solidaridad" class="partner-logo active" />
        <img src="public/images/kenya_oil_gas.png" alt="Kenya Oil and Gas Working Group" class="partner-logo" />
        <img src="public/images/geomine.png" alt="Geomine Consulting Limited" class="partner-logo" />
        <img src="public/images/mesk.png" alt="Mining Engineers Society of Kenya" class="partner-logo" />
        <img src="public/images/kenya_chamber_mines.png" alt="Kenya Chamber of Mines" class="partner-logo" />
        <img src="public/images/turkana_county_govt.png" alt="Turkana County Government" class="partner-logo" />
        <img src="public/images/tcam.png" alt="Turkana County ASM Association" class="partner-logo" />
        <img src="public/images/the_impact_facility.png" alt="The Impact Facility" class="partner-logo" />
      </div>
    </div>

    <nav class="main-nav" id="mainNav">
      <a href="index.html#about">About</a>
      <a href="index.html#why-attend">Why Attend</a>
      <a href="index.html#objectives">Objectives</a>
      <a href="index.html#pricing">Packages</a>
      <a href="index.html#agenda">Agenda</a>
      <a href="index.html#speakers">Speakers</a>
      <a href="index.html#venue">Venue</a>
      <a href="index.html#sponsors">Sponsors</a>
      <a href="index.html#contact">Contact</a>
    </nav>

    <div class="nav-actions">
      <a href="register.html" class="btn btn-primary">Register Now</a>
      <button class="menu-toggle" id="menuToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<div class="center-wrap">
  <div class="login-card">
    <h1>Welcome back</h1>
    <p class="login-sub">Log in to access your delegate dashboard.</p>

    <div id="formMsg" class="form-msg"></div>

    <form id="loginForm" novalidate>
      <div class="field"><label for="email">Email address</label><input type="email" id="email" required /></div>
      <div class="field">
        <label for="password">Password</label>
        <div class="password-input-wrap">
          <input type="password" id="password" required />
          <button type="button" class="password-toggle-btn" aria-label="Show password">
            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" style="display: none;">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">Log In</button>
    </form>

    <p class="reg-note">Don't have an account? <a href="register.html">Register here</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth-config.js"></script>
<script>
  // Sticky header shadow
  const siteHeader = document.getElementById('siteHeader');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 10) siteHeader.classList.add('scrolled');
    else siteHeader.classList.remove('scrolled');
  });

  // Mobile nav toggle
  const menuToggle = document.getElementById('menuToggle');
  const mainNav = document.getElementById('mainNav');
  menuToggle?.addEventListener('click', () => mainNav.classList.toggle('open'));
  mainNav?.querySelectorAll('a').forEach(a =>
    a.addEventListener('click', () => mainNav.classList.remove('open'))
  );

  // Navbar partner carousel
  const navLogos = document.querySelectorAll('#navPartnerCarousel .partner-logo');
  let currentNavLogo = 0;
  if (navLogos.length > 0) {
    setInterval(() => {
      navLogos[currentNavLogo].classList.remove('active');
      currentNavLogo = (currentNavLogo + 1) % navLogos.length;
      navLogos[currentNavLogo].classList.add('active');
    }, 3000);
  }

  const form = document.getElementById("loginForm");
  const msg = document.getElementById("formMsg");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    setFormMessage(msg, "");
    submitBtn.disabled = true;
    submitBtn.textContent = "Logging in…";

    try {
      const { error } = await supabaseClient.auth.signInWithPassword({
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value
      });
      if (error) throw error;
      window.location.href = "dashboard.html";
    } catch (err) {
      setFormMessage(msg, err.message || "Login failed. Check your details and try again.");
      submitBtn.disabled = false;
      submitBtn.textContent = "Log In";
    }
  });

  // Password visibility toggle
  document.querySelectorAll('.password-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const wrap = btn.closest('.password-input-wrap');
      const input = wrap.querySelector('input');
      const eyeIcon = btn.querySelector('.eye-icon');
      const eyeOffIcon = btn.querySelector('.eye-off-icon');
      
      if (input.type === 'password') {
        input.type = 'text';
        btn.setAttribute('aria-label', 'Hide password');
        eyeIcon.style.display = 'none';
        eyeOffIcon.style.display = 'block';
      } else {
        input.type = 'password';
        btn.setAttribute('aria-label', 'Show password');
        eyeIcon.style.display = 'block';
        eyeOffIcon.style.display = 'none';
      }
    });
  });
</script>
</body>
</html>
